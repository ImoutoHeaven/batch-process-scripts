name: advArchiver Integration

on:
  push:
  pull_request:

jobs:
  real-cli-guardrails:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build advArchiver test image
        run: docker build --platform linux/amd64 -t advarchiver-test -f advArchiver/Dockerfile .

      - name: Run build contract and real-binary guardrails
        run: docker run --rm --platform linux/amd64 advarchiver-test
